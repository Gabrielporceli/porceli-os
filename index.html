<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Porceli Company</title>
    <meta name="description" content="Sistema de CRM para gestão de leads, clientes e contratos" />
    <meta name="author" content="Porceli Company" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="alternate icon" href="/favicon.png" type="image/png">

    <meta property="og:title" content="Porceli Company" />
    <meta property="og:description" content="Sistema de CRM para gestão de leads, clientes e contratos" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@porcelicompany" />
    <meta name="twitter:image" content="/logo.png" />
  </head>

  <body>
    <!-- Filtro de refração para o efeito Liquid Glass (lente que entorta o fundo nas bordas).
         Referenciado no CSS via backdrop-filter: url(#liquidGlassRefract). -->
    <svg width="0" height="0" style="position:absolute;pointer-events:none" aria-hidden="true">
      <filter id="liquidGlassRefract" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.012 0.014" numOctaves="2" seed="7" result="noise" />
        <feGaussianBlur in="noise" stdDeviation="2.4" result="softNoise" />
        <feDisplacementMap in="SourceGraphic" in2="softNoise" scale="14" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </svg>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
